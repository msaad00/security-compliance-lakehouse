# Default values for the TrustOps Helm chart.
# Override per-environment via `helm install --values prod.yaml` or `--set`.

image:
  repository: ghcr.io/msaad00/trustops
  tag: "" # defaults to .Chart.appVersion when empty
  pullPolicy: IfNotPresent
  pullSecrets: []

# Replica count — TrustOps is currently single-writer for the lake. Run
# multiple replicas behind an Ingress only when the lake is mounted
# read-only (e.g. auditor portal); otherwise stick to 1.
replicaCount: 1

serviceAccount:
  # Set to false to use the namespace default. With OIDC + IRSA on EKS,
  # leave this true and set `annotations` to bind the IAM role that has
  # read-only access to your evidence bucket.
  create: true
  name: ""
  annotations: {}

podAnnotations: {}
podLabels: {}

podSecurityContext:
  fsGroup: 1100
  runAsNonRoot: true
  runAsUser: 1100
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop: ["ALL"]
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1100

service:
  type: ClusterIP
  port: 8787
  annotations: {}

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: trustops.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

# Lake mount. Evidence stays in customer storage; the container mounts a
# read-only view (or read-write for managed-evidence mode).
lake:
  # When `persistence.enabled` is true a PVC is created; otherwise an
  # emptyDir is used (intended only for `helm test` runs).
  persistence:
    enabled: true
    size: 20Gi
    accessMode: ReadWriteOnce
    storageClassName: "" # cluster default
  # Container path mirrored from the Dockerfile.
  mountPath: /lake
  # Mount the lake read-only for auditor-only deployments.
  readOnly: false

# X-Trust-Role default applied to in-cluster requests (set to auditor on the
# Trust Center deployment so it serves the redacted projection by default).
defaultTrustRole: ""

# Resources — TrustOps is mostly I/O bound on lake reads; CPU only spikes
# when re-evaluating posture across many controls.
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 1Gi

# Liveness + readiness target /api/healthz (the Python server's built-in).
probes:
  liveness:
    enabled: true
    initialDelaySeconds: 15
    periodSeconds: 30
    timeoutSeconds: 5
  readiness:
    enabled: true
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 5

# Cron scheduler for trigger.cron workflows. Runs `security-lakehouse
# scheduler tick` every interval; backed by a CronJob so the API pod can
# stay single-replica without owning the scheduler too.
scheduler:
  enabled: true
  schedule: "*/5 * * * *" # every 5 minutes
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  concurrencyPolicy: Forbid

# Optional: extra env vars (e.g. for SCIM / OIDC integration in future PRs).
env: []

nodeSelector: {}
tolerations: []
affinity: {}
