name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install package
        run: python -m pip install -e ".[dev]"
      - name: Validate sample evidence
        run: security-lakehouse validate --raw data/raw/security_events.jsonl
      - name: Validate catalog and mappings
        run: python -c "from security_lakehouse.catalog import validate_catalog; errors = validate_catalog(); assert not errors, errors"
      - name: Validate connector access contracts
        run: security-lakehouse connectors validate
      - name: Run pipeline smoke
        run: security-lakehouse pipeline run --raw data/raw/security_events.jsonl --out build/lakehouse
      - name: Validate current posture API payload
        run: security-lakehouse assessment status --lake build/lakehouse
      - name: Render dashboard
        run: security-lakehouse dashboard --lake build/lakehouse --out build/dashboard/index.html
      - name: Run tests
        run: python -m pytest -q
