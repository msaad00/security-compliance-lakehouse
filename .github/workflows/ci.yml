name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/web
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: app/web/package-lock.json
      - name: Install
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Build static export
        run: npm run build
      - name: Upload built React bundle
        uses: actions/upload-artifact@v7
        with:
          name: web-dist
          path: src/security_lakehouse/web/dist
          if-no-files-found: error
          retention-days: 1

  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
          enable-cache: true
      - name: Install (frozen lockfile)
        run: uv sync --frozen --all-extras
      - name: Check patch whitespace
        run: git diff --check
      - name: Compile Python
        run: uv run python -m compileall -q src tests tools
      - name: Lint Python
        run: uv run ruff check src tests tools
      - name: Check Python formatting
        run: uv run ruff format --check src tests tools
      - name: Validate schemas and JSON artifacts
        run: uv run python tools/validate_ci_artifacts.py

  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - uses: pre-commit/action@v3.0.1

  security:
    runs-on: ubuntu-latest
    needs: web
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
          enable-cache: true
      - name: Install (frozen)
        run: uv sync --frozen --all-extras
      - name: pip-audit (Python deps)
        # Audit resolved deps from uv.lock, skipping the local editable
        # package (not on PyPI). Fails CI on any known CVE.
        run: |
          uv export --no-emit-project --format requirements-txt --no-hashes > /tmp/reqs.txt
          uv run pip-audit --strict -r /tmp/reqs.txt
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: app/web/package-lock.json
      - name: npm audit (production deps, high+)
        working-directory: app/web
        run: npm audit --omit=dev --audit-level=high || true
      - name: gitleaks (secret scan)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  smoke:
    runs-on: ubuntu-latest
    needs: web
    steps:
      - uses: actions/checkout@v5
      - name: Download React bundle
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: src/security_lakehouse/web/dist
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
          enable-cache: true
      - name: Install (frozen)
        run: uv sync --frozen --all-extras
      - name: Validate sample evidence
        run: uv run security-lakehouse validate --raw data/raw/security_events.jsonl
      - name: Validate catalog and mappings
        run: uv run python -c "from security_lakehouse.catalog import validate_catalog; from security_lakehouse.programs import validate_program_catalog; errors = validate_catalog() + validate_program_catalog(); assert not errors, errors"
      - name: Validate connector access contracts
        run: uv run security-lakehouse connectors validate
      - name: Run pipeline smoke
        run: uv run security-lakehouse pipeline run --raw data/raw/security_events.jsonl --out build/lakehouse
      - name: Validate generated lake artifacts
        run: uv run python tools/validate_ci_artifacts.py --generated
      - name: Validate current posture API payload
        run: uv run security-lakehouse assessment status --lake build/lakehouse
      - name: Render dashboard
        run: uv run security-lakehouse dashboard --lake build/lakehouse --out build/dashboard/index.html
      - name: Verify dashboard artifact
        run: test -s build/dashboard/index.html && grep -q "Assessment workbench" build/dashboard/index.html
      - name: Run live API smoke
        run: uv run python tools/api_smoke.py
      - name: Run tests
        run: uv run python -m pytest -q

  deploy-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: azure/setup-helm@v5
        with:
          version: v3.16.0
      - name: helm lint
        run: helm lint deploy/helm/trustops
      - name: helm template
        run: helm template trustops deploy/helm/trustops > /tmp/render.yaml
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.5
      - name: terraform fmt
        run: terraform -chdir=deploy/eks-terraform fmt -check
      - name: terraform init (no backend)
        run: terraform -chdir=deploy/eks-terraform init -backend=false -input=false
      - name: terraform validate
        run: terraform -chdir=deploy/eks-terraform validate

  docker-build:
    runs-on: ubuntu-latest
    needs: web
    steps:
      - uses: actions/checkout@v5
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: trustops:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
