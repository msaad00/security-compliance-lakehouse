# Weekly bumps so dependency security patches don't sit. Grouped where
# the bumps tend to land together to keep PR noise down.

version: 2
updates:
  # Python deps (pyproject.toml + uv.lock)
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "07:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "python"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      python-minor:
        update-types: ["minor", "patch"]

  # React workbench (app/web/package.json + package-lock.json)
  - package-ecosystem: "npm"
    directory: "/app/web"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "07:15"
      timezone: "UTC"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "javascript"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    # Major-version bumps for these three are gated behind manual upgrade
    # PRs: each ships breaking API changes (Tailwind 4 = CSS-driven
    # theme rewrite, Next 16 = async dynamic APIs + Image/Link, Recharts
    # 3 = renamed Tooltip/Tick props). Patch + minor still flow.
    ignore:
      - dependency-name: "tailwindcss"
        update-types: ["version-update:semver-major"]
      - dependency-name: "next"
        update-types: ["version-update:semver-major"]
      - dependency-name: "recharts"
        update-types: ["version-update:semver-major"]
    groups:
      react-flow:
        patterns:
          - "@xyflow/*"
          - "@dagrejs/*"
      radix:
        patterns:
          - "@radix-ui/*"
      tanstack:
        patterns:
          - "@tanstack/*"
      types:
        patterns:
          - "@types/*"

  # GitHub Actions pinned versions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "07:30"
      timezone: "UTC"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "chore(actions)"
      include: "scope"

  # Container base images (Dockerfile)
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "07:45"
      timezone: "UTC"
    open-pull-requests-limit: 2
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "chore(docker)"
      include: "scope"
