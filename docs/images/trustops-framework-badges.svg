  <rect x="44" y="318" width="362" height="20" rx="10" fill="#0f172a" stroke="#2c4058"/>
  <rect x="52" y="325" width="260" height="6" rx="3" fill="url(#line)"/>
  <text x="424" y="333" class="tiny">Versioned source URLs, hashes, mappings, and readiness gates stay separate from certification claims.</text>
