<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="360" viewBox="0 0 1280 360" role="img" aria-labelledby="title desc">
  <title id="title">TrustOps source-linked framework badges</title>
  <desc id="desc">Neutral TrustOps-owned SVG badges for eight source-linked compliance and AI governance frameworks. These are not official certification seals.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#09111b"/>
      <stop offset=".52" stop-color="#111827"/>
      <stop offset="1" stop-color="#103b45"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#4f7cff"/>
      <stop offset="1" stop-color="#30c7d2"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#020617" flood-opacity=".28"/>
    </filter>
    <style>
      .eyebrow{font:800 15px Inter,Arial,sans-serif;fill:#7dd3fc}
      .title{font:900 42px Inter,Arial,sans-serif;fill:#fff}
      .sub{font:600 18px Inter,Arial,sans-serif;fill:#c7d2e1}
      .card{fill:#fff;stroke:#d8e2ef;stroke-width:1.4}
      .name{font:900 18px Inter,Arial,sans-serif;fill:#111827}
      .meta{font:700 13px Inter,Arial,sans-serif;fill:#64748b}
      .tiny{font:800 11px Inter,Arial,sans-serif;fill:#64748b}
      .sealText{font:900 13px Inter,Arial,sans-serif;text-anchor:middle}
    </style>
  </defs>
  <rect width="1280" height="360" rx="28" fill="url(#bg)"/>
  <circle cx="1120" cy="70" r="180" fill="none" stroke="#315dff" stroke-opacity=".20" stroke-width="2"/>
  <circle cx="1020" cy="312" r="118" fill="none" stroke="#30c7d2" stroke-opacity=".18" stroke-width="2"/>
  <text x="44" y="56" class="eyebrow">SOURCE-LINKED FRAMEWORK SCOPE</text>
  <text x="44" y="108" class="title">Compliance and AI governance badges</text>
  <text x="44" y="142" class="sub">Neutral TrustOps SVG marks for framework support. No certification seal or official-logo claim.</text>

  <g filter="url(#shadow)">
    <g transform="translate(44 184)">
      <rect class="card" width="140" height="112" rx="12"/>
      <rect x="16" y="16" width="48" height="48" rx="10" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
      <path d="M40 22 55 28.5v11c0 9.5-6.2 17.2-15 20-8.8-2.8-15-10.5-15-20v-11L40 22Z" fill="#fff" opacity=".86"/>
      <path d="M32.5 39.5 37.3 44.2 48.2 33.4" fill="none" stroke="#7c3aed" stroke-linecap="round" stroke-linejoin="round" stroke-width="3.6"/>
      <text x="40" y="59" fill="#2e1065" class="sealText">SOC2</text>
      <text x="16" y="86" class="name">SOC 2</text>
      <text x="16" y="104" class="meta">TSC</text>
    </g>
    <g transform="translate(200 184)">
