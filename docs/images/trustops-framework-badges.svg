      <path d="M32.5 39.5 37.3 44.2 48.2 33.4" fill="none" stroke="#16a34a" stroke-linecap="round" stroke-linejoin="round" stroke-width="3.6"/>
      <text x="40" y="59" fill="#14532d" class="sealText">HIP</text>
      <text x="16" y="86" class="name">HIPAA</text>
      <text x="16" y="104" class="meta">Security</text>
    </g>
    <g transform="translate(668 184)">
