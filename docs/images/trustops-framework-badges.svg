      <path d="M32.5 39.5 37.3 44.2 48.2 33.4" fill="none" stroke="#ea580c" stroke-linecap="round" stroke-linejoin="round" stroke-width="3.6"/>
      <text x="40" y="59" fill="#7c2d12" class="sealText">PCI</text>
      <text x="16" y="86" class="name">PCI DSS</text>
      <text x="16" y="104" class="meta">v4.0</text>
    </g>
    <g transform="translate(824 184)">
      <rect class="card" width="140" height="112" rx="12"/>
