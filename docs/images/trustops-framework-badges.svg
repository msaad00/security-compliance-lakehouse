<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="360" viewBox="0 0 1280 360" role="img" aria-labelledby="title desc">
  <title id="title">TrustOps source-linked framework badges</title>
  <desc id="desc">TrustOps-owned SVG badges for eight source-linked compliance and AI governance frameworks. These are not official certification seals.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#09111b"/><stop offset=".55" stop-color="#111827"/><stop offset="1" stop-color="#103b45"/></linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#4f7cff"/><stop offset="1" stop-color="#30c7d2"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#020617" flood-opacity=".28"/></filter>
    <style>.eyebrow{font:800 15px Inter,Arial,sans-serif;fill:#7dd3fc}.title{font:900 42px Inter,Arial,sans-serif;fill:#fff}.sub{font:600 18px Inter,Arial,sans-serif;fill:#c7d2e1}.card{fill:#fff;stroke:#d8e2ef;stroke-width:1.4}.name{font:900 18px Inter,Arial,sans-serif;fill:#111827}.meta{font:700 13px Inter,Arial,sans-serif;fill:#64748b}</style>
  </defs>
  <rect width="1280" height="360" rx="28" fill="url(#bg)"/>
  <circle cx="1120" cy="70" r="180" fill="none" stroke="#315dff" stroke-opacity=".20" stroke-width="2"/>
  <circle cx="1020" cy="312" r="118" fill="none" stroke="#30c7d2" stroke-opacity=".18" stroke-width="2"/>
  <text x="44" y="56" class="eyebrow">SOURCE-LINKED FRAMEWORK SCOPE</text>
  <text x="44" y="108" class="title">Compliance and AI governance coverage</text>
  <text x="44" y="142" class="sub">TrustOps SVG marks for framework support. No certification seal or official-logo claim.</text>
  <g filter="url(#shadow)">
    <g transform="translate(44 184)"><rect class="card" width="136" height="112" rx="12"/><circle cx="40" cy="40" r="24" fill="#0f3a78"/><circle cx="40" cy="40" r="24" fill="none" stroke="#3b82f6" stroke-width="2"/><text x="40" y="39" text-anchor="middle" fill="#fff" font-family="Inter,Arial,sans-serif" font-size="13" font-weight="900">SOC</text><text x="40" y="52" text-anchor="middle" fill="#bfdbfe" font-family="Inter,Arial,sans-serif" font-size="12" font-weight="900">2</text><text x="16" y="86" class="name">SOC 2</text><text x="16" y="104" class="meta">TSC</text></g>
    <g transform="translate(196 184)"><rect class="card" width="136" height="112" rx="12"/><rect x="16" y="16" width="48" height="48" rx="10" fill="#0b3d91"/><rect x="16" y="16" width="48" height="48" rx="10" fill="none" stroke="#fc3d21" stroke-width="2"/><text x="40" y="39" text-anchor="middle" fill="#fff" font-family="Inter,Arial,sans-serif" font-size="12" font-weight="900">NIST</text><text x="40" y="51" text-anchor="middle" fill="#fbbf24" font-family="Inter,Arial,sans-serif" font-size="8" font-weight="900">AI RMF</text><text x="16" y="86" class="name">NIST AI</text><text x="16" y="104" class="meta">RMF 1.0</text></g>
    <g transform="translate(348 184)"><rect class="card" width="136" height="112" rx="12"/><rect x="16" y="16" width="48" height="48" rx="6" fill="#b91c1c"/><text x="40" y="39" text-anchor="middle" fill="#fff" font-family="Inter,Arial,sans-serif" font-size="13" font-weight="900">ISO</text><text x="40" y="52" text-anchor="middle" fill="#fecaca" font-family="Inter,Arial,sans-serif" font-size="9" font-weight="900">27001</text><text x="16" y="86" class="name">ISO 27001</text><text x="16" y="104" class="meta">2022</text></g>
    <g transform="translate(500 184)"><rect class="card" width="136" height="112" rx="12"/><path d="M40 16 58 22v14c0 12-9 19-18 20-9-1-18-8-18-20V22Z" fill="#047857" stroke="#a7f3d0" stroke-width="1.5"/><text x="40" y="44" text-anchor="middle" fill="#fff" font-family="Inter,Arial,sans-serif" font-size="11" font-weight="900">HIPAA</text><text x="16" y="86" class="name">HIPAA</text><text x="16" y="104" class="meta">Security</text></g>
    <g transform="translate(652 184)"><rect class="card" width="136" height="112" rx="12"/><rect x="16" y="22" width="48" height="36" rx="4" fill="#b45309"/><rect x="16" y="28" width="48" height="6" fill="#92400e"/><text x="40" y="47" text-anchor="middle" fill="#fff" font-family="Inter,Arial,sans-serif" font-size="13" font-weight="900">PCI</text><text x="16" y="86" class="name">PCI DSS</text><text x="16" y="104" class="meta">v4.0</text></g>
    <g transform="translate(804 184)"><rect class="card" width="136" height="112" rx="12"/><circle cx="40" cy="40" r="24" fill="#003399"/><text x="40" y="44" text-anchor="middle" fill="#fff" font-family="Inter,Arial,sans-serif" font-size="12" font-weight="900">GDPR</text><text x="16" y="86" class="name">GDPR</text><text x="16" y="104" class="meta">2016/679</text></g>
    <g transform="translate(956 184)"><rect class="card" width="136" height="112" rx="12"/><rect x="16" y="16" width="48" height="48" rx="8" fill="#1e3a8a"/><rect x="16" y="16" width="48" height="48" rx="8" fill="none" stroke="#ffcc00" stroke-width="2"/><text x="40" y="38" text-anchor="middle" fill="#ffcc00" font-family="Inter,Arial,sans-serif" font-size="11" font-weight="900">EU</text><text x="40" y="52" text-anchor="middle" fill="#fff" font-family="Inter,Arial,sans-serif" font-size="10" font-weight="900">AI ACT</text><text x="16" y="86" class="name">EU AI Act</text><text x="16" y="104" class="meta">2024/1689</text></g>
    <g transform="translate(1108 184)"><rect class="card" width="128" height="112" rx="12"/><rect x="16" y="16" width="48" height="48" rx="6" fill="#7c2d12"/><text x="40" y="39" text-anchor="middle" fill="#fff" font-family="Inter,Arial,sans-serif" font-size="13" font-weight="900">ISO</text><text x="40" y="52" text-anchor="middle" fill="#fed7aa" font-family="Inter,Arial,sans-serif" font-size="9" font-weight="900">42001</text><text x="16" y="86" class="name">ISO</text><text x="16" y="104" class="meta">42001</text></g>
  </g>
  <rect x="44" y="318" width="362" height="20" rx="10" fill="#0f172a" stroke="#2c4058"/><rect x="52" y="325" width="260" height="6" rx="3" fill="url(#accent)"/>
  <text x="424" y="333" font-family="Inter,Arial,sans-serif" font-size="12" font-weight="800" fill="#94a3b8">Versioned source URLs, hashes, mappings, evidence requirements, and readiness gates back every badge.</text>
</svg>
