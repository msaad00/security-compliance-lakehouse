      <text x="40" y="59" fill="#831843" class="sealText">AI</text>
      <text x="16" y="86" class="name">EU AI Act</text>
      <text x="16" y="104" class="meta">2024/1689</text>
    </g>
    <g transform="translate(1136 184)">
      <rect class="card" width="100" height="112" rx="12"/>
      <rect x="16" y="16" width="48" height="48" rx="10" fill="#cffafe" stroke="#0891b2" stroke-width="2"/>
      <path d="M40 22 55 28.5v11c0 9.5-6.2 17.2-15 20-8.8-2.8-15-10.5-15-20v-11L40 22Z" fill="#fff" opacity=".86"/>
