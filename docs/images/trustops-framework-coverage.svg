<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="390" viewBox="0 0 1280 390" role="img" aria-labelledby="title desc">
  <title id="title">TrustOps framework coverage summary</title>
  <desc id="desc">Framework coverage tiles with current seeded controls, reviewed mappings, and official-source readiness signals. Tiles are neutral labels, not official logos or certification seals.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#08111d"/>
      <stop offset=".5" stop-color="#111827"/>
      <stop offset="1" stop-color="#0f4c5c"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#4f7cff"/>
      <stop offset=".5" stop-color="#2dd4bf"/>
      <stop offset="1" stop-color="#22c55e"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#020617" flood-opacity=".30"/>
    </filter>
    <style>
      .eyebrow{font:800 15px Inter,Arial,sans-serif;letter-spacing:2.4px;fill:#7dd3fc}
      .title{font:900 40px Inter,Arial,sans-serif;fill:#fff}
      .sub{font:600 17px Inter,Arial,sans-serif;fill:#cbd5e1}
      .tile{fill:#fff;stroke:#dbeafe;stroke-width:1.2}
      .mark{font:900 17px Inter,Arial,sans-serif;fill:#0f172a}
      .meta{font:800 12px Inter,Arial,sans-serif;fill:#64748b}
      .small{font:700 11px Inter,Arial,sans-serif;fill:#64748b}
      .num{font:900 24px Inter,Arial,sans-serif;fill:#0f172a}
      .pill{font:900 10px Inter,Arial,sans-serif;letter-spacing:.9px;fill:#065f46}
      .foot{font:800 12px Inter,Arial,sans-serif;fill:#94a3b8}
    </style>
  </defs>
  <rect width="1280" height="390" rx="28" fill="url(#bg)"/>
  <circle cx="1110" cy="84" r="185" fill="none" stroke="#315dff" stroke-opacity=".20" stroke-width="2"/>
  <circle cx="1038" cy="326" r="118" fill="none" stroke="#2dd4bf" stroke-opacity=".18" stroke-width="2"/>

  <text x="44" y="58" class="eyebrow">SOURCE-LINKED FRAMEWORK COVERAGE</text>
  <text x="44" y="110" class="title">34 controls · 34 reviewed mappings · 8 frameworks</text>
  <text x="44" y="143" class="sub">Official-source links, readiness gates, evidence requirements, and versioned rules back every framework tile.</text>

  <g filter="url(#shadow)">
    <g transform="translate(44 184)">
      <rect class="tile" width="136" height="128" rx="14"/>
      <rect x="16" y="16" width="64" height="24" rx="12" fill="#dbeafe"/>
      <text x="28" y="33" class="pill" fill="#1d4ed8">TRUST</text>
      <text x="16" y="66" class="mark">SOC 2</text>
      <text x="16" y="85" class="meta">TSC</text>
      <text x="16" y="115" class="num">2</text><text x="48" y="115" class="small">controls</text>
    </g>
    <g transform="translate(196 184)">
      <rect class="tile" width="136" height="128" rx="14"/>
      <rect x="16" y="16" width="64" height="24" rx="12" fill="#dcfce7"/>
      <text x="28" y="33" class="pill">PUBLIC</text>
      <text x="16" y="66" class="mark">NIST AI</text>
      <text x="16" y="85" class="meta">RMF 1.0</text>
      <text x="16" y="115" class="num">6</text><text x="48" y="115" class="small">controls</text>
    </g>
    <g transform="translate(348 184)">
      <rect class="tile" width="136" height="128" rx="14"/>
      <rect x="16" y="16" width="64" height="24" rx="12" fill="#fef3c7"/>
      <text x="30" y="33" class="pill" fill="#92400e">LINKED</text>
      <text x="16" y="66" class="mark">ISO 27001</text>
      <text x="16" y="85" class="meta">2022</text>
      <text x="16" y="115" class="num">3</text><text x="48" y="115" class="small">controls</text>
    </g>
    <g transform="translate(500 184)">
      <rect class="tile" width="136" height="128" rx="14"/>
      <rect x="16" y="16" width="64" height="24" rx="12" fill="#dcfce7"/>
      <text x="28" y="33" class="pill">PUBLIC</text>
      <text x="16" y="66" class="mark">HIPAA</text>
      <text x="16" y="85" class="meta">Security</text>
      <text x="16" y="115" class="num">6</text><text x="48" y="115" class="small">controls</text>
    </g>
    <g transform="translate(652 184)">
      <rect class="tile" width="136" height="128" rx="14"/>
      <rect x="16" y="16" width="64" height="24" rx="12" fill="#fef3c7"/>
      <text x="30" y="33" class="pill" fill="#92400e">LINKED</text>
      <text x="16" y="66" class="mark">PCI DSS</text>
      <text x="16" y="85" class="meta">v4.0</text>
      <text x="16" y="115" class="num">3</text><text x="48" y="115" class="small">controls</text>
    </g>
    <g transform="translate(804 184)">
      <rect class="tile" width="136" height="128" rx="14"/>
      <rect x="16" y="16" width="64" height="24" rx="12" fill="#dcfce7"/>
      <text x="28" y="33" class="pill">PUBLIC</text>
      <text x="16" y="66" class="mark">GDPR</text>
      <text x="16" y="85" class="meta">2016/679</text>
      <text x="16" y="115" class="num">6</text><text x="48" y="115" class="small">controls</text>
    </g>
    <g transform="translate(956 184)">
      <rect class="tile" width="136" height="128" rx="14"/>
      <rect x="16" y="16" width="64" height="24" rx="12" fill="#dcfce7"/>
      <text x="28" y="33" class="pill">PUBLIC</text>
      <text x="16" y="66" class="mark">EU AI Act</text>
      <text x="16" y="85" class="meta">2024/1689</text>
      <text x="16" y="115" class="num">6</text><text x="48" y="115" class="small">controls</text>
    </g>
    <g transform="translate(1108 184)">
      <rect class="tile" width="128" height="128" rx="14"/>
      <rect x="16" y="16" width="64" height="24" rx="12" fill="#fef3c7"/>
      <text x="30" y="33" class="pill" fill="#92400e">LINKED</text>
      <text x="16" y="66" class="mark">ISO 42001</text>
      <text x="16" y="85" class="meta">2023</text>
      <text x="16" y="115" class="num">2</text><text x="48" y="115" class="small">controls</text>
    </g>
  </g>

  <rect x="44" y="338" width="460" height="18" rx="9" fill="#0f172a" stroke="#2c4058"/>
  <rect x="52" y="344" width="444" height="6" rx="3" fill="url(#accent)"/>
  <text x="526" y="352" class="foot">100% of seeded controls have reviewed source mappings. Marks are neutral labels unless official usage permission is documented.</text>
</svg>
