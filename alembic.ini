# Alembic config for local/dev use: `alembic upgrade head`.
# The CLI (`security-lakehouse db upgrade`) and the installed wheel build their
# config programmatically in security_lakehouse.db.migrate and do not read this.
[alembic]
script_location = src/security_lakehouse/migrations
sqlalchemy.url = sqlite:///build/lakehouse/server/app.db

[loggers]
keys = root

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
